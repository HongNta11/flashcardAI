<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flashcards" />
  <meta name="theme-color" content="#6c63ff" />
  <title>Flashcard Study</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --accent: #6c63ff;
      --text: #1e1b4b;
      --text-muted: #64748b;
      --correct: #16a34a;
      --wrong: #dc2626;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(108,99,255,0.10);
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #app { min-height: 100%; display: flex; flex-direction: column; }

    /* Flip card */
    .card-scene { perspective: 1200px; margin-bottom: 20px; }
    .card-flipper {
      display: grid;
      transform-style: preserve-3d;
      transition: transform 0.52s cubic-bezier(0.4,0.2,0.2,1);
    }
    .card-flipper.flipped { transform: rotateY(180deg); }
    .card-face {
      grid-area: 1/1;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .card-face-back { transform: rotateY(180deg); }

    /* Slide transition */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(52px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .slide-in { animation: slideIn 0.28s ease-out; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>window.API_BASE = 'http://localhost:8000';</script>
  <script>window.API_BASE = '/api';</script>
  <script type="module" src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
